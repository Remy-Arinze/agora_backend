trigger:
  branches:
    include:
      - dev
      - staging

pool:
  vmImage: 'ubuntu-latest'

variables:
  azureSubscription: 'agora-current-sc'
  apiAppName: 'agora-api-dev'

stages:
- stage: Backend
  displayName: 'Deploy Backend (API)'
  jobs:
  - job: BuildAndDeployAPI
    steps:
    - task: NodeTool@0
      inputs:
        versionSpec: '20.x'
      displayName: 'Install Node.js'
    
    - script: |
        echo "=== Environment Info ==="
        echo "Node version: $(node --version)"
        echo "NPM version: $(npm --version)"
        echo "Working directory: $(pwd)"
      displayName: 'Show Environment Info'

    - script: npm install
      displayName: 'Install Dependencies'

    - script: npx prisma generate --schema=prisma/schema.prisma
      displayName: 'Generate Prisma Client'

    # COMMENTED OUT: Remove this temporarily to see actual TypeScript errors
    # Uncomment only after fixing build issues if you really need it
    # - bash: |
    #     path="tsconfig.json"
    #     if [ -f "$path" ]; then
    #         node -e "
    #             const fs = require('fs');
    #             const tsconfig = JSON.parse(fs.readFileSync('$path'));
    #             if (!tsconfig.compilerOptions) tsconfig.compilerOptions = {};
    #             tsconfig.compilerOptions.strict = false;
    #             tsconfig.compilerOptions.noImplicitAny = false;
    #             tsconfig.compilerOptions.skipLibCheck = true;
    #             fs.writeFileSync('$path', JSON.stringify(tsconfig, null, 2));
    #         "
    #         echo "Disabled strict mode in tsconfig.json"
    #     fi
    #   displayName: 'Disable Strict TypeScript Checks'

    - script: |
        echo "=== Starting NestJS Build ==="
        npx nest build --verbose
        BUILD_EXIT_CODE=$?
        
        echo ""
        echo "=== Build Exit Code: $BUILD_EXIT_CODE ==="
        
        if [ $BUILD_EXIT_CODE -ne 0 ]; then
          echo "##vso[task.logissue type=error]NestJS build failed with exit code $BUILD_EXIT_CODE"
          exit 1
        fi
        
        echo ""
        echo "=== Verifying Build Output ==="
        if [ ! -d "dist" ]; then
          echo "##vso[task.logissue type=error]dist directory was not created"
          exit 1
        fi
        
        echo "Contents of dist/:"
        ls -lR dist/
        
        if [ ! -f "dist/main.js" ]; then
          echo "##vso[task.logissue type=error]CRITICAL: dist/main.js not found"
          echo "Available files in dist/:"
          find dist -type f
          exit 1
        fi
        
        echo ""
        echo "✓ Build completed successfully"
        echo "✓ dist/main.js exists"
      displayName: 'Build NestJS'
      env:
        NODE_OPTIONS: '--max-old-space-size=4096'

    - script: npm prune --production
      displayName: 'Prune Dev Dependencies'

    - bash: |
        ROOT=$(Build.SourcesDirectory)
        DEPLOY_DIR=$ROOT/deploy_api
        
        echo "=== Preparing Deployment Package ==="
        echo "Source directory: $ROOT"
        echo "Deployment directory: $DEPLOY_DIR"
        
        rm -rf $DEPLOY_DIR
        mkdir -p $DEPLOY_DIR
        
        echo ""
        echo "=== Copying Build Artifacts ==="
        if [ ! -d "$ROOT/dist" ]; then
          echo "##vso[task.logissue type=error]CRITICAL: dist directory not found in $ROOT"
          exit 1
        fi
        
        cp -r $ROOT/dist $DEPLOY_DIR/
        echo "✓ Copied dist/"
        
        if [ ! -f "$ROOT/package.json" ]; then
          echo "##vso[task.logissue type=error]CRITICAL: package.json not found"
          exit 1
        fi
        
        cp $ROOT/package.json $DEPLOY_DIR/
        echo "✓ Copied package.json"
        
        echo ""
        echo "=== Copying Production Dependencies ==="
        if [ ! -d "$ROOT/node_modules" ]; then
          echo "##vso[task.logissue type=error]node_modules directory not found"
          exit 1
        fi
        
        cp -r $ROOT/node_modules $DEPLOY_DIR/
        echo "✓ Copied node_modules/"
        
        echo ""
        echo "=== Copying Prisma Schema ==="
        if [ -d "$ROOT/prisma" ]; then
          mkdir -p $DEPLOY_DIR/prisma
          cp -r $ROOT/prisma/* $DEPLOY_DIR/prisma/
          echo "✓ Copied prisma/"
        else
          echo "⚠ No prisma directory found (may not be needed)"
        fi
        
        echo ""
        echo "=== Deployment Package Contents ==="
        echo "Top level:"
        ls -la $DEPLOY_DIR/
        
        echo ""
        echo "dist/ contents:"
        ls -la $DEPLOY_DIR/dist/
        
        echo ""
        echo "Verifying critical files..."
        if [ ! -f "$DEPLOY_DIR/dist/main.js" ]; then
          echo "##vso[task.logissue type=error]CRITICAL: dist/main.js missing from deployment package"
          exit 1
        fi
        
        if [ ! -f "$DEPLOY_DIR/package.json" ]; then
          echo "##vso[task.logissue type=error]CRITICAL: package.json missing from deployment package"
          exit 1
        fi
        
        echo ""
        echo "✓ Deployment package assembled successfully"
      displayName: 'Assemble Deployment Package'

    - task: ArchiveFiles@2
      inputs:
        rootFolderOrFile: '$(Build.SourcesDirectory)/deploy_api'
        includeRootFolder: false
        archiveType: 'zip'
        archiveFile: '$(Build.ArtifactStagingDirectory)/api.zip'
        replaceExistingArchive: true
      displayName: 'Create Deployment Archive'

    - script: |
        echo "=== Archive Verification ==="
        ls -lh $(Build.ArtifactStagingDirectory)/api.zip
        unzip -l $(Build.ArtifactStagingDirectory)/api.zip | head -50
      displayName: 'Verify Archive Contents'

    - task: AzureWebApp@1
      inputs:
        azureSubscription: $(azureSubscription)
        appType: 'webAppLinux'
        appName: $(apiAppName)
        package: '$(Build.ArtifactStagingDirectory)/api.zip'
        startUpCommand: 'node dist/main'
      displayName: 'Deploy to Azure Web App'
