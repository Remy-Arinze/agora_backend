trigger:
  branches:
    include:
      - main   
      - staging   

pool:
  vmImage: 'ubuntu-latest'

variables:
  # Dynamically set variables based on branch
  ${{ if eq(variables['Build.SourceBranch'], 'refs/heads/main') }}:
    azureSubscription: 'agora-current-sc'
    apiAppName: 'agora-api-dev'
    databaseUrlVar: 'DATABASE_URL_DEV'
    environmentName: 'Development'
  ${{ if eq(variables['Build.SourceBranch'], 'refs/heads/staging') }}:
    azureSubscription: 'agora-current-sc-stg'
    apiAppName: 'agora-api-stg'
    databaseUrlVar: 'DATABASE_URL_STAGING'
    environmentName: 'Staging'

stages:
- stage: Backend
  displayName: 'Deploy Backend to $(environmentName)'
  jobs:
  - job: BuildAndDeployAPI
    displayName: 'Build and Deploy API'
    steps:
    - task: NodeTool@0
      inputs:
        versionSpec: '20.x'
      displayName: 'Install Node.js'
    
    - script: |
        echo "=========================================="
        echo "Deployment Configuration"
        echo "=========================================="
        echo "Environment: $(environmentName)"
        echo "Branch: $(Build.SourceBranch)"
        echo "App Name: $(apiAppName)"
        echo "Service Connection: $(azureSubscription)"
        echo "=========================================="
      displayName: 'Show Deployment Info'

    - script: npm install
      displayName: 'Install Dependencies'

    - script: |
        echo "=== Deploying Database Migrations ==="
        npx prisma migrate deploy --schema=prisma/schema.prisma
        
        echo ""
        echo "=== Regenerating Prisma Client ==="
        npx prisma generate --schema=prisma/schema.prisma
        
        echo "✓ Database migrated and Prisma Client updated"
      displayName: 'Migrate Database and Update Pris
