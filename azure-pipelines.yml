trigger:
  branches:
    include:
      - dev
      - staging
#all changes
pool:
  vmImage: 'ubuntu-latest'

variables:
  azureSubscription: 'agora-current-sc'
  apiAppName: 'agora-api-stg'

stages:
- stage: Backend
  displayName: 'Deploy Backend (API)'
  jobs:
  - job: BuildAndDeployAPI
    steps:
    - task: NodeTool@0
      inputs:
        versionSpec: '20.x'
      displayName: 'Install Node.js'

    - script: npm install
      displayName: 'Install Dependencies'

    # ⭐ CRITICAL: Migrate database FIRST, then regenerate Prisma Client
    - script: |
        echo "=== Deploying Database Migrations ==="
        npx prisma migrate deploy --schema=prisma/schema.prisma
        
        echo ""
        echo "=== Regenerating Prisma Client with New Schema ==="
        npx prisma generate --schema=prisma/schema.prisma
        
        echo "✓ Database migrated and Prisma Client updated"
      displayName: 'Migrate Database and Update Prisma Client'
      env:
        DATABASE_URL: $(DATABASE_URL_STAGING)

    - script: |
        echo "=== Building NestJS Application ==="
        npx nest build
        BUILD_EXIT_CODE=$?
        
        if [ $BUILD_EXIT_CODE -ne 0 ]; then
          echo "##vso[task.logissue type=error]Build failed"
          exit 1
        fi
        
        echo ""
        echo "=== Verifying Build Output ==="
        if [ ! -f "dist/main.js" ]; then
          echo "##vso[task.logissue type=error]dist/main.js not found"
          exit 1
        fi
        
        echo "✓ Build successful"
        ls -la dist/
      displayName: 'Build NestJS'
      env:
        NODE_OPTIONS: '--max-old-space-size=4096'

    - script: npm prune --production
      displayName: 'Prune Dev Dependencies'

    - bash: |
        ROOT=$(Build.SourcesDirectory)
        DEPLOY_DIR=$ROOT/deploy_api
        
        echo "=== Assembling Deployment Package ==="
        rm -rf $DEPLOY_DIR
        mkdir -p $DEPLOY_DIR
        
        cp -r dist $DEPLOY_DIR/
        cp package.json $DEPLOY_DIR/
        cp -r node_modules $DEPLOY_DIR/
        
        if [ -d "prisma" ]; then
          mkdir -p $DEPLOY_DIR/prisma
          cp -r prisma/* $DEPLOY_DIR/prisma/
        fi
        
        echo "✓ Package ready"
        ls -la $DEPLOY_DIR/
      displayName: 'Assemble Deployment Package'

    - task: ArchiveFiles@2
      inputs:
        rootFolderOrFile: '$(Build.SourcesDirectory)/deploy_api'
        includeRootFolder: false
        archiveType: 'zip'
        archiveFile: '$(Build.ArtifactStagingDirectory)/api.zip'
        replaceExistingArchive: true
      displayName: 'Create Deployment Archive'

    - task: AzureWebApp@1
      inputs:
        azureSubscription: $(azureSubscription)
        appType: 'webAppLinux'
        appName: $(apiAppName)
        package: '$(Build.ArtifactStagingDirectory)/api.zip'
        startUpCommand: 'node dist/main'
      displayName: 'Deploy to Azure Web App'
