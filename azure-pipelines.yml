trigger:
  branches:
    include:
      - dev
      - staging

pool:
  vmImage: 'ubuntu-latest'

# ──────────────────────────────────────────────────────────
# Branch-Based Variables: This is how we separate Dev and Staging
# ──────────────────────────────────────────────────────────
variables:
  ${{ if eq(variables['Build.SourceBranchName'], 'dev') }}:
    - group: agora-dev-rg  # Connects to your Dev Variable Group
    - name: apiAppName
      value: 'agora-api-dev'
    - name: azureSubscription
      value: 'agora-current-sc'
    - name: environmentName
      value: 'Dev'

  ${{ if eq(variables['Build.SourceBranchName'], 'staging') }}:
    - group: agora-stg-rg  # Connects to your Staging Variable Group
    - name: apiAppName
      value: 'agora-api-stg'
    - name: azureSubscription
      value: 'agora-current-sc-stg'
    - name: environmentName
      value: 'Staging'

stages:
- stage: Backend
  displayName: 'Deploy Backend'
  jobs:
  - job: BuildAndDeployAPI
    steps:
    - task: NodeTool@0
      inputs:
        versionSpec: '20.x'

    - script: npm install
      displayName: 'Install Dependencies'

    # ⭐ CRITICAL: Uses $(DB_Url) from the loaded Variable Group
    - script: |
        echo "=== Environment: $(environmentName) ==="
        echo "=== Deploying Database Migrations ==="
        npx prisma migrate deploy --schema=prisma/schema.prisma
        
        echo "=== Regenerating Prisma Client ==="
        npx prisma generate --schema=prisma/schema.prisma
      displayName: 'Migrate Database and Update Prisma Client'
      env:
        # We map the group variable to the name Prisma expects
        DATABASE_URL: $(DB_Url) 

    - script: |
        echo "=== Building NestJS Application ==="
        npx nest build
        
        if [ ! -f "dist/main.js" ]; then
          echo "##vso[task.logissue type=error]dist/main.js not found"
          exit 1
        fi
      displayName: 'Build NestJS'
      env:
        NODE_OPTIONS: '--max-old-space-size=4096'

    - script: npm prune --production
      displayName: 'Prune Dev Dependencies'

    - bash: |
        DEPLOY_DIR=$(Build.SourcesDirectory)/deploy_api
        mkdir -p $DEPLOY_DIR
        cp -r dist $DEPLOY_DIR/
        cp package.json $DEPLOY_DIR/
        cp -r node_modules $DEPLOY_DIR/
        if [ -d "prisma" ]; then cp -r prisma $DEPLOY_DIR/; fi
      displayName: 'Assemble Package'

    - task: ArchiveFiles@2
      inputs:
        rootFolderOrFile: '$(Build.SourcesDirectory)/deploy_api'
        includeRootFolder: false
        archiveFile: '$(Build.ArtifactStagingDirectory)/api.zip'

    # Uses the variables we set at the top based on the branch
    - task: AzureWebApp@1
      displayName: 'Deploy to $(environmentName)'
      inputs:
        azureSubscription: $(azureSubscription)
        appType: 'webAppLinux'
        appName: $(apiAppName)
        package: '$(Build.ArtifactStagingDirectory)/api.zip'
        startUpCommand: 'node dist/main'
